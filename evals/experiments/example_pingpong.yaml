# Example experiment spec (canon §22).
#
# Run it with:
#   selfevals run evals/experiments/example_pingpong.yaml \
#       --workspace ws_01HZZZZZZZZZZZZZZZZZZZZZZZ --no-persist
#
# The agent entrypoint below ships in this repo for the test suite; in
# your project, it would point at your actual agent function.

workspace: ws_01HZZZZZZZZZZZZZZZZZZZZZZZ

experiment:
  name: pingpong baseline
  goal: warm up the end-to-end loop with a trivial echo agent
  mode: handoff
  taxonomy:
    target_features:
      - commerce.product_resolution
    dataset_types:
      - capability
  # These refs are placeholders: when the run uses inline cases (the `dataset:`
  # block below), launch materializes a real Dataset over them and rewrites
  # `datasets.optimization` / `frozen.datasets` to point at it. To reuse a
  # dataset you uploaded separately, replace the `dataset:` block with
  # `dataset: { ref: ds_<id> }` and these will resolve to that dataset instead.
  datasets:
    optimization: { id: ds_pingpong, version: 1 }
  target:
    primary: { name: pass@1, operator: ">=", value: 0.5 }
  editable:
    prompt: true
    model_params: true
  frozen:
    fleet: { id: flt_demo }
    agents:
      - { id: ag_demo }
    datasets:
      - { id: ds_pingpong }
  proposer:
    strategy: grid
  search_space:
    model_params:
      level: [0.0, 1.0]
  run:
    sandbox: mock
    max_iterations: 4
    convergence:
      min_delta: 1.0e-6
      patience: 10
  reliability:
    metrics:
      - pass@1
  # Opt into the continuous error-analysis loop (design §9). When an iteration's
  # fail rate clears the threshold, selfevals stages a bundle and the bundled
  # `error-analysis` skill can run `analyze pull` → code → `analyze push`.
  error_analysis:
    enabled: true
    taxonomy: workspace
    trigger:
      when: fail_rate_above
      threshold: 0.10
    scope: failed_only

# How this experiment gets its cases. Three shapes (pick one):
#   cases_path: ../datasets/pingpong.jsonl   # JSONL on disk (this example)
#   cases_inline: [ {...}, {...} ]           # cases declared right here
#   ref: ds_01H...                           # reuse a persisted dataset by id
# The first two materialize a Dataset at launch; `ref` resolves an existing one
# (create it with `selfevals dataset create` or POST .../datasets first).
# Optional metadata for the materialized dataset: name, dataset_type,
# split_allocation, description.
dataset:
  cases_path: ../datasets/pingpong.jsonl

agent:
  entrypoint: selfevals.examples.pingpong:run
