services:
  postgres:
    image: postgres:16-alpine
    container_name: selfevals-postgres
    environment:
      POSTGRES_USER: selfevals
      POSTGRES_PASSWORD: selfevals
      POSTGRES_DB: selfevals
    ports:
      - "5432:5432"
    volumes:
      - selfevals-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfevals -d selfevals"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: selfevals-redis
    ports:
      - "6380:6379"
    volumes:
      - selfevals-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  selfevals-postgres-data:
  selfevals-redis-data:
