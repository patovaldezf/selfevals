name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: selfevals
          POSTGRES_PASSWORD: selfevals
          POSTGRES_DB: selfevals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U selfevals -d selfevals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The storage backend is Postgres-only; the suite clones a fresh database
      # per test from this server (pytest-postgresql noproc).
      SELFEVALS_TEST_POSTGRES_URL: postgresql://selfevals:selfevals@localhost:5432/selfevals
      SELFEVALS_STORAGE_URL: postgresql://selfevals:selfevals@localhost:5432/selfevals
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy src/selfevals
      - run: uv run python scripts/audit_technical_debt.py --fail-on-regression
      - run: uv run pytest
      - run: uv run python -m build
      - run: uv run twine check dist/*

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build

  landing:
    name: Landing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: selfevals
          POSTGRES_PASSWORD: selfevals
          POSTGRES_DB: selfevals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U selfevals -d selfevals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The E2E backend reads from this Postgres database; global-setup seeds it.
      E2E_DB_URL: postgresql://selfevals:selfevals@localhost:5432/selfevals
    steps:
      - uses: actions/checkout@v4
      # `psql` is needed by e2e/fixtures/seed.sh to reset the schema.
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      # Python toolchain — the E2E suite boots the real FastAPI backend
      # against a seeded Postgres fixture db (see web/playwright.config.ts).
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      # Node toolchain.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: web
        env:
          # Point the suite at the uv-managed interpreter that has selfevals.
          SELFEVALS_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
